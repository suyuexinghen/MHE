name: Benchmark PR dry-run

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Check changed Python formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: |
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "$BASE_SHA" ]; then
            ruff format --check .
            exit 0
          fi
          changed_python="$(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" HEAD -- '*.py')"
          if [ -z "$changed_python" ]; then
            echo "No changed Python files to format-check."
            exit 0
          fi
          printf '%s\n' "$changed_python" | xargs -r -d '\n' ruff format --check
      - name: Lint
        run: ruff check .
      - name: Run focused benchmark tests
        run: |
          python -m pytest tests/test_benchmark_drivers_cli.py -q
          python -m pytest tests/test_benchmark_approval_policy.py -q
          python -m pytest tests/test_metaharness_pycfd_benchmark_ci.py -q

  dry-run-benchmark:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        suite:
          - octave-native
          - nektar-pde
          - qcompute-abacus
          - fealpy-pde
          - pycfd-pde
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run dry-run benchmark
        run: |
          PYTHONPATH=src python -m metaharness.cli benchmark-run \
            --suite "${{ matrix.suite }}" \
            --lanes extension,direct,agent \
            --runs-root ".runs/ci-pr/${{ matrix.suite }}"
      - name: Compare dry-run benchmark
        run: |
          PYTHONPATH=src python -m metaharness.cli benchmark-compare \
            --suite "${{ matrix.suite }}" \
            --runs-root ".runs/ci-pr/${{ matrix.suite }}"
      - name: Check approval policy
        run: |
          PYTHONPATH=src python -m metaharness.cli benchmark-approval-check \
            --suite "${{ matrix.suite }}" \
            --config-root .mhe
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-${{ matrix.suite }}
          path: .runs/ci-pr/${{ matrix.suite }}
          if-no-files-found: warn
          retention-days: 14
