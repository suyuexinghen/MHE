name: Benchmark nightly real tools

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run, or all"
        default: all
        required: true
        type: choice
        options:
          - all
          - octave-native
          - nektar-pde
          - qcompute-abacus
          - fealpy-pde
          - pycfd-pde
      cases:
        description: "Optional comma-separated case IDs"
        default: ""
        required: false
        type: string

permissions:
  contents: read

jobs:
  real-tool-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: octave-native
            smoke_cases: ode45-exp-decay
          - suite: nektar-pde
            smoke_cases: advdiff-2d
          - suite: qcompute-abacus
            smoke_cases: h2-fcidump-vqe-proxy
          - suite: fealpy-pde
            smoke_cases: poisson-2d-numpy
          - suite: pycfd-pde
            smoke_cases: vortex-2d
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run gated real-tool benchmark
        env:
          REQUESTED_SUITE: ${{ inputs.suite || 'all' }}
          REQUESTED_CASES: ${{ inputs.cases || '' }}
        run: |
          if [ "$REQUESTED_SUITE" != "all" ] && [ "$REQUESTED_SUITE" != "${{ matrix.suite }}" ]; then
            echo "Skipping ${{ matrix.suite }} because workflow input requested $REQUESTED_SUITE"
            exit 0
          fi
          SELECTED_CASES="${REQUESTED_CASES:-${{ matrix.smoke_cases }}}"
          CASE_ARGS=()
          if [ -n "$SELECTED_CASES" ]; then
            CASE_ARGS=(--cases "$SELECTED_CASES")
          fi
          PYTHONPATH=src python -m metaharness.cli benchmark-run \
            --suite "${{ matrix.suite }}" \
            --lanes extension \
            --runs-root ".runs/ci-real-tools/${{ matrix.suite }}" \
            --allow-real-tools \
            "${CASE_ARGS[@]}"
      - name: Compare real-tool benchmark
        env:
          REQUESTED_SUITE: ${{ inputs.suite || 'all' }}
        run: |
          if [ "$REQUESTED_SUITE" != "all" ] && [ "$REQUESTED_SUITE" != "${{ matrix.suite }}" ]; then
            exit 0
          fi
          PYTHONPATH=src python -m metaharness.cli benchmark-compare \
            --suite "${{ matrix.suite }}" \
            --runs-root ".runs/ci-real-tools/${{ matrix.suite }}" \
            --allow-real-tools
      - name: Check approval policy
        env:
          REQUESTED_SUITE: ${{ inputs.suite || 'all' }}
        run: |
          if [ "$REQUESTED_SUITE" != "all" ] && [ "$REQUESTED_SUITE" != "${{ matrix.suite }}" ]; then
            exit 0
          fi
          PYTHONPATH=src python -m metaharness.cli benchmark-approval-check \
            --suite "${{ matrix.suite }}" \
            --config-root .mhe
      - name: Summarize extension smoke truth
        if: always()
        env:
          REQUESTED_SUITE: ${{ inputs.suite || 'all' }}
        run: |
          if [ "$REQUESTED_SUITE" != "all" ] && [ "$REQUESTED_SUITE" != "${{ matrix.suite }}" ]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          suite = "${{ matrix.suite }}"
          root = Path(".runs/ci-real-tools") / suite / f"{suite}-benchmark" / "extension"
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write(f"### {suite} real-tool extension smoke\n\n")
              handle.write("This job intentionally runs only the `extension` lane. Treat `extension/*/summary.json` as the smoke truth source; comparison rows can be `incomplete` because `direct` and `agent` lanes are absent.\n\n")
              handle.write("| Case | Status | Detail | Evidence files |\n")
              handle.write("|---|---|---|---|\n")

              summaries = sorted(root.glob("*/summary.json"))
              if not summaries:
                  handle.write("| n/a | missing | No extension summary files were written. | 0 |\n")

              for path in summaries:
                  data = json.loads(path.read_text(encoding="utf-8"))
                  status = data.get("status") or ("passed" if data.get("passed") else "failed")
                  detail = data.get("skip_reason") or data.get("failure_category") or data.get("error_message") or "ok"
                  evidence_count = len(data.get("evidence_files") or [])
                  handle.write(f"| `{data.get('case_id', path.parent.name)}` | `{status}` | {detail} | {evidence_count} |\n")
          PY
      - name: Upload real-tool artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-real-tools-${{ matrix.suite }}
          path: .runs/ci-real-tools/${{ matrix.suite }}
          if-no-files-found: warn
          retention-days: 30
