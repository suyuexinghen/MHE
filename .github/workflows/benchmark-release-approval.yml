name: Benchmark release approval

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      strict:
        description: "Run strict approval checks"
        default: true
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  approval-policy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - octave-native
          - nektar-pde
          - qcompute-abacus
          - fealpy-pde
          - pycfd-pde
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run strict approval check
        env:
          STRICT: ${{ inputs.strict || true }}
        run: |
          STRICT_ARGS=()
          if [ "$STRICT" = "true" ]; then
            STRICT_ARGS=(--strict)
          fi
          PYTHONPATH=src python -m metaharness.cli benchmark-approval-check \
            --suite "${{ matrix.suite }}" \
            --config-root .mhe \
            "${STRICT_ARGS[@]}"
      - name: Write claim-boundary summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          Benchmark approval policy was checked for `${{ matrix.suite }}`.

          A passing CI approval check means the policy is parseable and enforced. It does not replace benchmark promotion admin approval, scientific validation, production converter readiness, or retained repeated real-run evidence.
          EOF
